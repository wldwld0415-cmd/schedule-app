<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>특허 미팅 일정 수집</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
var firebaseConfig = {
  apiKey: "AIzaSyB9Bg4OYlCw76MuHvokPHZvFtLbXB3rMe0",
  databaseURL: "https://meeting-planner-5d9a5-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ── Firebase helpers (Supabase-style wrappers) ──
async function fbGet(path){
  var snap = await db.ref(path).get();
  return snap.exists() ? snap.val() : null;
}
async function fbSet(path, data){
  await db.ref(path).set(data);
}
async function fbGetAll(path){
  var snap = await db.ref(path).get();
  if(!snap.exists()) return [];
  var val = snap.val();
  return Object.keys(val).map(function(k){ return Object.assign({_key:k}, val[k]); });
}
async function fbDelete(path){ await db.ref(path).remove(); }
var EXPIRE_MS = 30 * 24 * 60 * 60 * 1000;
async function checkExpired(eid,ev){
  if(!ev||!ev.expires_at) return false;
  if(Date.now()<ev.expires_at) return false;
  try{ await fbDelete("events/"+eid); await fbDelete("agent_responses/"+eid); await fbDelete("inventor_responses/"+eid); }catch(e){}
  return true;
}
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede8;--card:#fff;--border:#ddd9d2;--border2:#ccc8c0;
  --text:#1c1a17;--muted:#6e6a62;--hint:#a09c94;
  --accent:#1d4ed8;--accent-bg:#eff6ff;--accent-border:#bfdbfe;
  --green:#15803d;--green-bg:#f0fdf4;--red:#dc2626;--red-bg:#fef2f2;
  --amber:#b45309;--amber-bg:#fffbeb;--tag:#f5f1ec;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem}
.wrap{max-width:500px;margin:0 auto}
.app-title{text-align:center;margin-bottom:1.5rem}
.app-title .logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--hint);text-transform:uppercase;margin-bottom:6px}
.app-title h1{font-size:20px;font-weight:700}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1rem}
.card-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border)}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-bottom:7px}
.badge-manager{background:#fef3c7;color:#92400e}
.badge-agent{background:#dbeafe;color:#1e40af}
.badge-inventor{background:#d1fae5;color:#065f46}
.badge-done{background:#f3f4f6;color:#6b7280}
.card-header h2{font-size:16px;font-weight:700;margin-bottom:3px}
.card-header p{font-size:12px;color:var(--muted);line-height:1.6}
.card-body{padding:1.5rem}
.screen{display:none}.screen.active{display:block}
.field{margin-bottom:1.25rem}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
.field input,.field select{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;font-family:inherit;color:var(--text);background:#fff;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--accent)}
/* firm manager */
.firm-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:28px}
.firm-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:20px;font-size:12px;font-weight:500;color:var(--accent)}
.firm-tag .rm{background:none;border:none;cursor:pointer;color:var(--accent);font-size:15px;line-height:1;padding:0;opacity:.7}
.firm-tag .rm:hover{opacity:1}
.firm-add-row{display:flex;gap:6px}
.firm-add-row input{flex:1;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;outline:none}
.firm-add-row input:focus{border-color:var(--accent)}
.firm-add-row button{padding:7px 12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer}
.firm-add-row button:hover{background:#1e40af}
/* date slots */
.date-row{display:flex;gap:8px;align-items:center;padding:9px 11px;background:var(--tag);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px}
.date-row .dl{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;min-width:96px}
.date-row .ti{display:flex;align-items:center;gap:5px;flex:1}
.date-row .ti select{padding:4px 6px;border:1px solid var(--border2);border-radius:5px;font-size:11px;font-family:'DM Mono',monospace;outline:none;background:#fff}
.date-row .ti span{font-size:11px;color:var(--muted)}
.date-row .rm2{background:none;border:none;cursor:pointer;color:var(--hint);font-size:16px;padding:0 2px;line-height:1}
.date-row .rm2:hover{color:var(--red)}
.add-date-row{display:flex;gap:6px;margin-top:2px}
.add-date-row input[type=date]{flex:1;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:12px;font-family:'DM Mono',monospace;outline:none;background:#fff}
.add-date-row button{padding:7px 12px;background:#fff;border:1px solid var(--border2);border-radius:var(--radius);font-size:12px;font-family:inherit;cursor:pointer;color:var(--text)}
.add-date-row button:hover{background:var(--tag)}
/* slot grid */
.slots-wrap{max-height:240px;overflow-y:auto;padding:2px}
.slot-date-group{margin-bottom:10px}
.slot-date-label{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--muted);margin-bottom:5px;text-transform:uppercase}
.slot-item{display:inline-block;padding:5px 9px;margin:2px;border:1px solid var(--border2);border-radius:5px;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;user-select:none;background:#fff;transition:all .1s}
.slot-item:hover{border-color:var(--accent);color:var(--accent)}
.slot-item.sel{background:var(--accent);border-color:var(--accent);color:#fff}
/* buttons */
.btn{display:block;width:100%;padding:11px;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .12s;text-align:center}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#1e40af}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#166534}
/* link box */
.link-box{background:var(--tag);border:1px solid var(--border);border-radius:var(--radius);padding:9px 52px 9px 11px;font-family:'DM Mono',monospace;font-size:11px;word-break:break-all;color:var(--muted);position:relative;line-height:1.5}
.copy-btn{position:absolute;top:8px;right:8px;background:#fff;border:1px solid var(--border2);border-radius:5px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:inherit;color:var(--muted)}
.copy-btn:hover{color:var(--accent)}
/* firm select */
.firm-sel-card{border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;margin-bottom:7px;cursor:pointer;transition:all .12s;display:flex;justify-content:space-between;align-items:center}
.firm-sel-card:hover,.firm-sel-card.active{border-color:var(--accent);background:var(--accent-bg)}
.firm-sel-card .fn{font-size:14px;font-weight:600}
.firm-sel-card .arr{font-size:18px;color:var(--hint)}
/* tabs */
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
.tab{padding:8px 0;font-size:12px;font-weight:600;color:var(--hint);cursor:pointer;margin-right:18px;border-bottom:2px solid transparent;transition:all .12s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* agent row */
.agent-row{font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.agent-row .aname{font-weight:600;flex:1}
.agent-row .acnt{font-size:11px;color:var(--muted)}
/* schedule */
.sched-item{display:flex;gap:10px;align-items:center;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:5px;background:#fff}
.sched-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);font-weight:500;min-width:64px;line-height:1.5;white-space:pre-line}
.sched-info{flex:1}
.sched-info .sn{font-size:13px;font-weight:600}
.sched-info .ss{font-size:11px;color:var(--muted)}
.sched-ics{background:none;border:1px solid var(--border2);border-radius:5px;padding:4px 8px;font-size:10px;cursor:pointer;font-family:inherit;color:var(--muted)}
.sched-ics:hover{color:var(--accent);border-color:var(--accent)}
.no-match{border-color:var(--red)!important;opacity:.65}
.no-match .sched-time{color:var(--red)}
/* utils */
.msg{padding:11px 13px;border-radius:var(--radius);font-size:13px;margin-bottom:12px;line-height:1.5}
.msg-info{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border)}
.msg-amber{background:var(--amber-bg);color:var(--amber)}
.msg-red{background:var(--red-bg);color:var(--red)}
.divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0}
.sec-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--hint);margin-bottom:8px}
.empty{text-align:center;padding:1.5rem;color:var(--hint);font-size:13px}
.refresh-btn{float:right;background:none;border:1px solid var(--border2);border-radius:5px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--muted)}
.refresh-btn:hover{color:var(--accent)}
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.15);display:none;align-items:center;justify-content:center;z-index:100}
.loading-box{background:#fff;border-radius:10px;padding:1.5rem 2rem;font-size:14px;color:var(--muted);display:flex;align-items:center;gap:10px}
.spin{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading-overlay" id="ov"><div class="loading-box"><div class="spin"></div>처리 중...</div></div>
<div class="wrap">
  <div class="app-title">
    <div class="logo">Patent Scheduling</div>
    <h1>특허 미팅 일정 수집</h1>
  </div>

  <!-- MANAGER -->
  <div id="sc-manager" class="screen active">
    <div class="card">
      <div class="card-header">
        <span class="badge badge-manager">내부 담당자</span>
        <h2>일정 수집 설정</h2>
        <p>특허법인, 날짜·시간 범위를 설정하고 대리인 응답 링크를 생성합니다.</p>
      </div>
      <div class="card-body">
        <div class="field">
          <label>이벤트 제목</label>
          <input type="text" id="event-title" placeholder="예: 발명 설명 미팅" value="발명 설명 미팅"/>
        </div>
        <div class="field">
          <label>특허법인 목록</label>
          <div class="firm-list" id="firm-list"></div>
          <div class="firm-add-row">
            <input type="text" id="firm-input" placeholder="법인명 입력 후 추가" onkeydown="if(event.key==='Enter')addFirm()"/>
            <button onclick="addFirm()">+ 추가</button>
          </div>
        </div>
        <div class="field">
          <label>날짜 및 가능 시간 범위</label>
          <div id="date-slots-list"></div>
          <div class="add-date-row">
            <input type="date" id="new-date-input"/>
            <button onclick="addDateSlot()">+ 날짜 추가</button>
          </div>
        </div>
        <button class="btn btn-primary" onclick="createScheduleEvent()">대리인 응답 링크 생성</button>
        <div id="manager-link-area" style="display:none;margin-top:1.25rem">
          <hr class="divider" style="margin-top:0"/>
          <div class="sec-title">생성된 링크</div>
          <div class="link-box" id="manager-link-box"></div>
          <p style="font-size:11px;color:var(--hint);margin-top:5px">이 링크를 각 특허 대리인에게 전달하세요.</p>
          <p style="font-size:11px;color:var(--amber);margin-top:3px" id="expire-notice"></p>
        </div>
      </div>
    </div>

    <div class="card" id="resp-card" style="display:none">
      <div class="card-header">
        <button class="refresh-btn" onclick="refreshAll()">↻ 새로고침</button>
        <h2>응답 현황</h2>
      </div>
      <div class="card-body">
        <div class="tab-bar">
          <div class="tab active" onclick="switchTab('agents',this)">대리인 응답</div>
          <div class="tab" onclick="switchTab('inventors',this)">발명자 응답</div>
          <div class="tab" onclick="switchTab('schedule',this)">일정 배치</div>
        </div>
        <div id="tab-agents"><div class="empty">아직 응답이 없습니다.</div></div>
        <div id="tab-inventors" style="display:none"><div class="empty">아직 발명자 응답이 없습니다.</div></div>
        <div id="tab-schedule" style="display:none"><div class="empty">발명자 응답이 수집되면 자동으로 배치됩니다.</div></div>
      </div>
    </div>
  </div>

  <!-- AGENT -->
  <div id="sc-agent" class="screen">
    <div class="card">
      <div class="card-header">
        <span class="badge badge-agent">특허 대리인</span>
        <h2 id="agent-title">발명 설명 미팅</h2>
        <p>소속 법인 선택 → 이름 입력 → 가능한 시간 선택 후 제출하세요.</p>
      </div>
      <div class="card-body">
        <div class="field">
          <label>소속 법인</label>
          <div id="agent-firm-list"></div>
        </div>
        <div class="field">
          <label>이름</label>
          <input type="text" id="agent-name" placeholder="예: 홍길동"/>
        </div>
        <div class="field">
          <label>가능한 시간 <span style="font-size:10px;color:var(--hint);text-transform:none;font-weight:400">(복수 선택 가능)</span></label>
          <div class="slots-wrap" id="agent-slots"></div>
        </div>
        <button class="btn btn-primary" onclick="submitAgent()">응답 제출</button>
      </div>
    </div>
  </div>

  <!-- INVENTOR -->
  <div id="sc-inventor" class="screen">
    <div class="card">
      <div class="card-header">
        <span class="badge badge-inventor">발명자</span>
        <h2 id="inv-title">발명 설명 미팅</h2>
        <p id="inv-agent-info"></p>
      </div>
      <div class="card-body">
        <div id="inv-notice" class="msg msg-info" style="display:none"></div>
        <div class="field">
          <label>이름</label>
          <input type="text" id="inventor-name" placeholder="예: 김철수"/>
        </div>
        <div class="field">
          <label>가능한 시간 <span style="font-size:10px;color:var(--hint);text-transform:none;font-weight:400">(대리인 가능 시간 내)</span></label>
          <div class="slots-wrap" id="inventor-slots"></div>
        </div>
        <button class="btn btn-primary" onclick="submitInventor()">응답 제출</button>
      </div>
    </div>
  </div>

  <!-- DONE -->
  <div id="sc-done" class="screen">
    <div class="card">
      <div class="card-header" style="text-align:center;padding:2.5rem 1.5rem">
        <div style="font-size:38px;margin-bottom:10px">✅</div>
        <span class="badge badge-done">응답 완료</span>
        <h2 id="done-title" style="margin-top:8px">제출 완료</h2>
        <p id="done-body" style="margin-top:6px;font-size:13px;color:var(--muted)"></p>
      </div>
    </div>
  </div>
</div>

<script>
// ── STATE ──
var S = {
  firms: ['특허법인 A', '특허법인 B', '특허법인 C'],
  dates: [],
  currentEid: null,
  activeTab: 'agents',
  agFirm: '', agSlots: [], agEid: '',
  invSlots: [], invAgKey: '', invEid: ''
};

// ── UTILS ──
function fmtH(h){ return String(h).padStart(2,'0')+':00'; }
function dateLabel(d){
  var days=['일','월','화','수','목','금','토'];
  var dt=new Date(d+'T00:00:00');
  return d.replace(/-/g,'/')+'('+days[dt.getDay()]+')';
}
function showScreen(id){ document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');}); document.getElementById(id).classList.add('active'); }
function ov(on){ document.getElementById('ov').style.display=on?'flex':'none'; }
function copyText(t){ navigator.clipboard.writeText(t).then(function(){alert('복사되었습니다.');}); }
function newId(){ return Math.random().toString(36).slice(2,9)+Math.random().toString(36).slice(2,5); }
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
// Firebase key-safe encode (Firebase 경로에 . / [ ] # $ 불가)
function encKey(s){ return encodeURIComponent(s).replace(/\./g,'%2E'); }
function decKey(s){ return decodeURIComponent(s); }

// ── FIRMS ──
function renderFirms(){
  var el=document.getElementById('firm-list');
  if(!S.firms.length){el.innerHTML='<span style="font-size:12px;color:var(--hint)">법인을 추가하세요</span>';return;}
  el.innerHTML=S.firms.map(function(f,i){
    return '<span class="firm-tag">'+escH(f)+'<button class="rm" onclick="removeFirm('+i+')">×</button></span>';
  }).join('');
}
function addFirm(){
  var v=document.getElementById('firm-input').value.trim();
  if(!v)return;
  if(S.firms.indexOf(v)>=0){alert('이미 있는 법인입니다.');return;}
  S.firms.push(v); document.getElementById('firm-input').value=''; renderFirms();
}
function removeFirm(i){ S.firms.splice(i,1); renderFirms(); }

// ── DATE SLOTS ──
function renderDateSlots(){
  var el=document.getElementById('date-slots-list');
  if(!S.dates.length){el.innerHTML='';return;}
  el.innerHTML=S.dates.map(function(d,i){
    var sh='',eh='';
    for(var h=6;h<=22;h++) sh+='<option value="'+h+'"'+(d.startH===h?' selected':'')+'>'+fmtH(h)+'</option>';
    for(var h=7;h<=23;h++) eh+='<option value="'+h+'"'+(d.endH===h?' selected':'')+'>'+fmtH(h)+'</option>';
    return '<div class="date-row"><span class="dl">'+dateLabel(d.date)+'</span>'+
      '<div class="ti"><select onchange="updateDate('+i+',\'s\',this.value)">'+sh+'</select><span>~</span>'+
      '<select onchange="updateDate('+i+',\'e\',this.value)">'+eh+'</select></div>'+
      '<button class="rm2" onclick="removeDate('+i+')">×</button></div>';
  }).join('');
}
function addDateSlot(){
  var v=document.getElementById('new-date-input').value;
  if(!v){alert('날짜를 선택하세요.');return;}
  if(S.dates.find(function(d){return d.date===v;})){alert('이미 추가된 날짜입니다.');return;}
  S.dates.push({date:v,startH:9,endH:18});
  S.dates.sort(function(a,b){return a.date>b.date?1:-1;});
  document.getElementById('new-date-input').value=''; renderDateSlots();
}
function updateDate(i,w,v){ v=parseInt(v); if(w==='s') S.dates[i].startH=v; else S.dates[i].endH=v; }
function removeDate(i){ S.dates.splice(i,1); renderDateSlots(); }
function buildSlots(ds){
  var out=[];
  ds.forEach(function(d){ for(var h=d.startH;h<d.endH;h++){ if(h>=12&&h<13)continue; out.push(d.date+'_'+h); } });
  return out;
}

// ── SLOT GRID ──
function renderGrid(cid, slots, sel, onToggle){
  var el=document.getElementById(cid); var groups={};
  slots.forEach(function(s){ var d=s.split('_')[0]; if(!groups[d])groups[d]=[]; groups[d].push(s); });
  var html='';
  Object.keys(groups).sort().forEach(function(date){
    html+='<div class="slot-date-group"><div class="slot-date-label">'+dateLabel(date)+'</div>';
    groups[date].forEach(function(s){
      html+='<span class="slot-item'+(sel.indexOf(s)>=0?' sel':'')+'" onclick="'+onToggle+'(\''+s+'\',this)">'+fmtH(parseInt(s.split('_')[1]))+'</span>';
    });
    html+='</div>';
  });
  el.innerHTML=html||'<div class="empty">설정된 시간이 없습니다.</div>';
}

// ── CREATE EVENT ──
async function createScheduleEvent(){
  if(!S.firms.length){alert('법인을 1개 이상 추가하세요.');return;}
  if(!S.dates.length){alert('날짜를 1개 이상 추가하세요.');return;}
  for(var i=0;i<S.dates.length;i++){ if(S.dates[i].startH>=S.dates[i].endH){alert('시작 시간이 종료 시간보다 늦습니다: '+dateLabel(S.dates[i].date));return;} }
  var title=document.getElementById('event-title').value.trim()||'발명 설명 미팅';
  var id=newId(); ov(true);
  try{
    await fbSet('events/'+id, {title:title, date_slots:S.dates, firms:S.firms, created_at:Date.now(), expires_at:Date.now()+EXPIRE_MS});
    S.currentEid=id;
    setManagerLink(id);
    refreshAll();
  }catch(e){ alert('저장 실패: '+e.message); }
  ov(false);
}

function setManagerLink(id){
  var link=location.origin+location.pathname+'?mode=agent&eid='+id;
  var box=document.getElementById('manager-link-box');
  box.textContent=link;
  var btn=document.createElement('button');
  btn.className='copy-btn'; btn.textContent='복사';
  btn.onclick=function(){copyText(link);};
  box.appendChild(btn);
  document.getElementById('manager-link-area').style.display='block';
  document.getElementById('resp-card').style.display='block';
  var expDate=new Date(Date.now()+EXPIRE_MS);
  var expStr=expDate.getFullYear()+'/'+(expDate.getMonth()+1)+'/'+(expDate.getDate());
  var noticeEl=document.getElementById('expire-notice');
  if(noticeEl) noticeEl.textContent='⚠ 이 이벤트는 '+expStr+' 이후 자동 삭제됩니다 (30일).';
}

// ── TABS ──
function switchTab(tab,el){
  S.activeTab=tab;
  document.querySelectorAll('.tab-bar .tab').forEach(function(t){t.classList.remove('active');}); el.classList.add('active');
  ['agents','inventors','schedule'].forEach(function(t){ document.getElementById('tab-'+t).style.display=t===tab?'block':'none'; });
  refreshAll();
}
async function refreshAll(){
  if(!S.currentEid)return;
  if(S.activeTab==='agents') await renderAgentTab();
  else if(S.activeTab==='inventors') await renderInventorTab();
  else await renderScheduleTab();
}

async function renderAgentTab(){
  var el=document.getElementById('tab-agents');
  el.innerHTML='<div class="empty">불러오는 중...</div>';
  try{
    var ev=await fbGet('events/'+S.currentEid);
    if(!ev){el.innerHTML='<div class="msg msg-red">이벤트를 찾을 수 없습니다.</div>';return;}
    if(await checkExpired(S.currentEid,ev)){el.innerHTML='<div class="msg msg-red">만료된 이벤트입니다 (30일 경과).</div>';return;}
    var agentsRaw=await fbGet('agent_responses/'+S.currentEid);
    // agentsRaw: { encKey(firm): { encKey(name): {slots:[...]} } }
    var html=''; var hasAny=false;
    var firms=ev.firms||[];
    firms.forEach(function(firm){
      var fk=encKey(firm);
      var firmData=agentsRaw&&agentsRaw[fk]?agentsRaw[fk]:{};
      html+='<div style="margin-bottom:14px"><div class="sec-title">'+escH(firm)+'</div>';
      var names=Object.keys(firmData);
      if(!names.length){html+='<div style="font-size:12px;color:var(--hint);padding:3px 0">응답 없음</div>';}
      else{
        hasAny=true;
        names.forEach(function(nk){
          var agName=decKey(nk);
          var slots=firmData[nk].slots||[];
          html+='<div class="agent-row"><span class="aname">'+escH(agName)+'</span><span class="acnt">'+slots.length+'개 선택</span></div>';
        });
      }
      html+='</div>';
    });
    if(hasAny){
      html+='<hr class="divider"/><div class="sec-title">발명자 응답 링크</div>';
      firms.forEach(function(firm){
        var fk=encKey(firm);
        var firmData=agentsRaw&&agentsRaw[fk]?agentsRaw[fk]:{};
        Object.keys(firmData).forEach(function(nk){
          var agName=decKey(nk);
          var agKey=encodeURIComponent(firm+'|||'+agName);
          var link=location.origin+location.pathname+'?mode=inventor&eid='+S.currentEid+'&agkey='+agKey;
          html+='<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:600;margin-bottom:4px">'+escH(firm)+' / '+escH(agName)+'</div>'+
            '<div class="link-box">'+link+'<button class="copy-btn" onclick="copyText(\''+link+'\')">복사</button></div></div>';
        });
      });
    }
    el.innerHTML=html||'<div class="empty">아직 응답이 없습니다.</div>';
  }catch(e){el.innerHTML='<div class="msg msg-red">불러오기 실패: '+e.message+'</div>';}
}

async function renderScheduleTab(){
  var el=document.getElementById('tab-schedule');
  el.innerHTML='<div class="empty">불러오는 중...</div>';
  try{
    var ev=await fbGet('events/'+S.currentEid);
    if(await checkExpired(S.currentEid,ev)){el.innerHTML='<div class="msg msg-red">만료된 이벤트입니다 (30일 경과).</div>';return;}
    var agentsRaw=await fbGet('agent_responses/'+S.currentEid);
    var invRaw=await fbGet('inventor_responses/'+S.currentEid);
    if(!ev){el.innerHTML='<div class="msg msg-red">이벤트를 찾을 수 없습니다.</div>';return;}
    if(!invRaw){el.innerHTML='<div class="empty">발명자 응답이 수집되면 자동으로 배치됩니다.</div>';return;}

    var html=''; var allMatched=[];
    Object.keys(invRaw).forEach(function(agKeyEnc){
      var agKey=decKey(agKeyEnc);
      var parts=agKey.split('|||'); var firm=parts[0],agName=parts[1];
      var fk=encKey(firm); var nk=encKey(agName);
      var agSlots=(agentsRaw&&agentsRaw[fk]&&agentsRaw[fk][nk]&&agentsRaw[fk][nk].slots)||[];
      agSlots=agSlots.slice().sort();
      var used={};
      html+='<div style="margin-bottom:16px"><div class="sec-title">'+escH(firm)+' / '+escH(agName)+'</div>';
      var nameMap=invRaw[agKeyEnc];
      Object.keys(nameMap).forEach(function(ink){
        var invName=decKey(ink);
        var invSlots=(nameMap[ink].slots)||[];
        var match=null;
        for(var i=0;i<agSlots.length;i++){ if(!used[agSlots[i]]&&invSlots.indexOf(agSlots[i])>=0){match=agSlots[i];used[match]=true;break;} }
        if(match){
          var h=parseInt(match.split('_')[1]); var date=match.split('_')[0];
          var item={date:date,h:h,name:invName,agName:agName,firm:firm,title:ev.title};
          allMatched.push(item);
          html+='<div class="sched-item"><div class="sched-time">'+date.slice(5).replace('-','/')+'\n'+fmtH(h)+'</div>'+
            '<div class="sched-info"><div class="sn">'+escH(invName)+'</div><div class="ss">'+escH(agName)+' | '+escH(firm)+'</div></div>'+
            '<button class="sched-ics" onclick=\'exportOne('+JSON.stringify(item)+')\'>📅 ICS</button></div>';
        } else {
          html+='<div class="sched-item no-match"><div class="sched-time">미배정</div>'+
            '<div class="sched-info"><div class="sn">'+escH(invName)+'</div><div class="ss">겹치는 시간 없음</div></div></div>';
        }
      });
      html+='</div>';
    });
    if(allMatched.length) html+='<button class="btn btn-green" onclick=\'exportAll('+JSON.stringify(allMatched)+')\'>📅 전체 ICS 내보내기</button>';
    el.innerHTML=html;
  }catch(e){el.innerHTML='<div class="msg msg-red">불러오기 실패: '+e.message+'</div>';}
}

// ── ICS ──
function mkEvent(item){
  function p(n){return String(n).padStart(2,'0');}
  var pt=item.date.split('-'); var h=item.h;
  return 'BEGIN:VEVENT\r\nSUMMARY:'+item.title+' - '+item.name+
    '\r\nDTSTART:'+pt[0]+pt[1]+pt[2]+'T'+p(h)+'0000'+
    '\r\nDTEND:'+pt[0]+pt[1]+pt[2]+'T'+p(h+1)+'0000'+
    '\r\nDESCRIPTION:대리인: '+item.agName+' ('+item.firm+')\r\nEND:VEVENT\r\n';
}
function wrapIcs(evs){return 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Patent Schedule//KR\r\n'+evs.join('')+'END:VCALENDAR';}
function dlIcs(c,n){var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:'text/calendar'}));a.download=n;a.click();}
function exportOne(item){dlIcs(wrapIcs([mkEvent(item)]),item.date+'_'+item.name+'.ics');}
function exportAll(items){dlIcs(wrapIcs(items.map(mkEvent)),'일정배치_전체.ics');}

// ── AGENT ──
async function initAgent(params){
  showScreen('sc-agent');
  try{
    var ev=await fbGet('events/'+params.eid);
    if(!ev){document.getElementById('sc-agent').innerHTML='<div class="card"><div class="card-body"><div class="msg msg-red">이벤트를 찾을 수 없습니다.</div></div></div>';return;}
    if(await checkExpired(params.eid,ev)){document.getElementById('sc-agent').innerHTML='<div class="card"><div class="card-body"><div class="msg msg-red">만료된 이벤트입니다 (30일 경과).</div></div></div>';return;}
    S.agEid=params.eid; S.agSlots=[];
    document.getElementById('agent-title').textContent=ev.title;
    var firms=ev.firms||[];
    document.getElementById('agent-firm-list').innerHTML=firms.map(function(f){
      return '<div class="firm-sel-card" onclick="selFirm(\''+f.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\'  ,this)"><span class="fn">'+escH(f)+'</span><span class="arr">›</span></div>';
    }).join('');
    renderGrid('agent-slots',buildSlots(ev.date_slots),S.agSlots,'togAg');
  }catch(e){document.getElementById('sc-agent').innerHTML='<div class="card"><div class="card-body"><div class="msg msg-red">오류: '+e.message+'</div></div></div>';}
}
function selFirm(f,el){ S.agFirm=f; document.querySelectorAll('.firm-sel-card').forEach(function(c){c.classList.remove('active');}); el.classList.add('active'); }
function togAg(s,el){ var i=S.agSlots.indexOf(s); if(i>=0){S.agSlots.splice(i,1);el.classList.remove('sel');}else{S.agSlots.push(s);el.classList.add('sel');} }
async function submitAgent(){
  if(!S.agFirm){alert('법인을 선택하세요.');return;}
  var name=document.getElementById('agent-name').value.trim();
  if(!name){alert('이름을 입력하세요.');return;}
  if(!S.agSlots.length){alert('가능한 시간을 선택하세요.');return;}
  ov(true);
  try{
    var path='agent_responses/'+S.agEid+'/'+encKey(S.agFirm)+'/'+encKey(name);
    await fbSet(path, {slots:S.agSlots, submitted_at:Date.now()});
    document.getElementById('done-title').textContent='응답이 제출되었습니다';
    document.getElementById('done-body').textContent=S.agFirm+' / '+name+'님, '+S.agSlots.length+'개 시간이 저장되었습니다. 내부 담당자가 발명자 응답 링크를 전달할 예정입니다.';
    showScreen('sc-done');
  }catch(e){alert('제출 실패: '+e.message);}
  ov(false);
}

// ── INVENTOR ──
async function initInventor(params){
  showScreen('sc-inventor');
  S.invEid=params.eid; S.invAgKey=params.agkey||''; S.invSlots=[];
  var parts=decodeURIComponent(S.invAgKey).split('|||'); var firm=parts[0],agName=parts[1];
  document.getElementById('inv-agent-info').textContent=firm+' / '+agName+' 대리인과의 미팅 일정입니다.';
  try{
    var ev=await fbGet('events/'+params.eid);
    if(!ev){document.getElementById('sc-inventor').innerHTML='<div class="card"><div class="card-body"><div class="msg msg-red">이벤트를 찾을 수 없습니다.</div></div></div>';return;}
    if(await checkExpired(params.eid,ev)){document.getElementById('sc-inventor').innerHTML='<div class="card"><div class="card-body"><div class="msg msg-red">만료된 이벤트입니다 (30일 경과).</div></div></div>';return;}
    document.getElementById('inv-title').textContent=ev.title;
    var agData=await fbGet('agent_responses/'+params.eid+'/'+encKey(firm)+'/'+encKey(agName));
    var notice=document.getElementById('inv-notice'); var allSlots;
    if(agData&&agData.slots&&agData.slots.length){
      allSlots=agData.slots.slice().sort();
      notice.style.display='block'; notice.className='msg msg-info';
      notice.textContent='대리인이 선택한 '+allSlots.length+'개 시간 중에서 선택하세요.';
    } else {
      allSlots=buildSlots(ev.date_slots);
      notice.style.display='block'; notice.className='msg msg-amber';
      notice.textContent='대리인 응답 전입니다. 전체 시간 중에서 선택하세요.';
    }
    renderGrid('inventor-slots',allSlots,S.invSlots,'togInv');
  }catch(e){document.getElementById('sc-inventor').innerHTML='<div class="card"><div class="card-body"><div class="msg msg-red">오류: '+e.message+'</div></div></div>';}
}
function togInv(s,el){ var i=S.invSlots.indexOf(s); if(i>=0){S.invSlots.splice(i,1);el.classList.remove('sel');}else{S.invSlots.push(s);el.classList.add('sel');} }
async function submitInventor(){
  var name=document.getElementById('inventor-name').value.trim();
  if(!name){alert('이름을 입력하세요.');return;}
  if(!S.invSlots.length){alert('가능한 시간을 선택하세요.');return;}
  ov(true);
  try{
    var agKey=decodeURIComponent(S.invAgKey);
    var path='inventor_responses/'+S.invEid+'/'+encKey(agKey)+'/'+encKey(name);
    await fbSet(path, {slots:S.invSlots, submitted_at:Date.now()});

    document.getElementById('done-body').textContent=name+'님의 '+S.invSlots.length+'개 시간이 저장되었습니다. 담당자가 일정을 확정하면 연락 드릴 예정입니다.';
    showScreen('sc-done');
  }catch(e){alert('제출 실패: '+e.message);}

}

// ── ROUTER ──
function getParams(){
  var p={};
  location.search.slice(1).split('&').forEach(function(pair){var kv=pair.split('=');if(kv[0])p[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||'');});
  return p;
}
async function route(){
  var p=getParams();
  if(p.mode==='agent'){ await initAgent(p); }
  else if(p.mode==='inventor'){ await initInventor(p); }
  else {
    if(p.eid){
      S.currentEid=p.eid;
      try{
        var ev=await fbGet('events/'+p.eid);
        if(ev){
          S.firms=ev.firms||[]; S.dates=ev.date_slots||[];
          document.getElementById('event-title').value=ev.title;
          renderFirms(); renderDateSlots();
          setManagerLink(p.eid); refreshAll();
        }
      }catch(e){}
    }
    showScreen('sc-manager');
  }
}

renderFirms(); renderDateSlots(); route();
setInterval(function(){ if(document.getElementById('sc-manager').classList.contains('active')&&S.currentEid) refreshAll(); },20000);
</script>
